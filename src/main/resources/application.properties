spring.application.name=workscholr-backend

spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/workscholr_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Kolkata}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:Likhitha@26}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

app.jwt.secret=${JWT_SECRET:change-this-to-a-long-random-secret-key-at-least-32-characters}
app.jwt.expiration-ms=86400000
app.upload.resume-dir=${RESUME_UPLOAD_DIR:uploads/resumes}

app.cors.allowed-origins=http://localhost:5173,https://work-scholr-git-main-likhitha-ratnala26s-projects.vercel.app
app.seed.demo-data=${SEED_DEMO_DATA:false}
app.bootstrap.admin.enabled=${BOOTSTRAP_ADMIN_ENABLED:false}
app.bootstrap.admin.full-name=${BOOTSTRAP_ADMIN_FULL_NAME:System Admin}
app.bootstrap.admin.email=${BOOTSTRAP_ADMIN_EMAIL:}
app.bootstrap.admin.password=${BOOTSTRAP_ADMIN_PASSWORD:}
springdoc.swagger-ui.path=/swagger-ui.html
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB

server.port=8080
